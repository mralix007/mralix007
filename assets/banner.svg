  <!-- glowing vanishing-point core (the light-speed singularity) -->
  <circle cx="470" cy="118" r="60" fill="url(#core)">
    <animate attributeName="r" values="48;66;48" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="470" cy="118" r="6" fill="#ffffff">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.4s" repeatCount="indefinite"/>
  </circle>

  <!-- MILLENNIUM FALCON, caught mid-jump: a light streak trailing into the core.
       Drawn streaking toward the vanishing point (no leftover engine tail). -->
  <g transform="translate(250,150)">
    <!-- light-speed streak the ship is riding -->
    <rect x="-10" y="-3" width="240" height="6" rx="3" fill="url(#falconStreak)" opacity="0.85">
      <animate attributeName="opacity" values="0.55;0.95;0.55" dur="1.6s" repeatCount="indefinite"/>
    </rect>
    <!-- the Falcon (rotated so nose points toward the core, up-right) -->
    <g transform="rotate(-14)">
      <use href="#falcon" x="-24" y="-24" width="48" height="48" transform="rotate(90)"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 10,-2; 0,0" dur="2.2s" repeatCount="indefinite" additive="sum"/>
    </g>
  </g>

