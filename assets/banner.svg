<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="240" viewBox="0 0 1000 240" role="img" aria-label="Muralidharan S — banner">
  <defs>
    <radialGradient id="space" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0a1330"/>
      <stop offset="55%" stop-color="#060a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff6b0"/>
      <stop offset="45%" stop-color="#FFE81F"/>
      <stop offset="100%" stop-color="#e0a400"/>
    </linearGradient>
    <filter id="titleGlow" x="-30%" y="-60%" width="160%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow"><feGaussianBlur stdDeviation="1.6"/></filter>
  </defs>

  <rect width="1000" height="240" fill="url(#space)"/>

  <!-- starfield with twinkle -->
  <g fill="#ffffff" filter="url(#softGlow)">
    <circle cx="80"  cy="40"  r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="170" r="1.1"><animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="60"  r="1.6"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="200" r="1"><animate attributeName="opacity" values="1;0.2;1" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="50"  r="1.3"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="150" r="1.5"><animate attributeName="opacity" values="1;0.4;1" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="920" cy="80"  r="1.1"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="560" cy="30"  r="1"><animate attributeName="opacity" values="1;0.3;1" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="640" cy="210" r="1.2"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="110" r="0.9"><animate attributeName="opacity" values="1;0.4;1" dur="3.0s" repeatCount="indefinite"/></circle>
  </g>

  <!-- shooting star -->
  <g>
    <line x1="0" y1="0" x2="34" y2="10" stroke="#9fb3ff" stroke-width="2" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0" keyTimes="0;0.6;0.75;1" dur="6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="120,-20; 120,-20; 760,150; 760,150" keyTimes="0;0.6;0.85;1" dur="6s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- title -->
  <text x="500" y="118" text-anchor="middle" font-family="Orbitron, Trebuchet MS, Verdana, sans-serif"
        font-size="66" font-weight="800" letter-spacing="4" fill="url(#gold)" filter="url(#titleGlow)">MURALIDHARAN&#160;S</text>

  <!-- animated underline lightsaber -->
  <rect x="500" y="138" width="0" height="4" rx="2" fill="#FFE81F" filter="url(#titleGlow)">
    <animate attributeName="width" values="0;420" dur="1.1s" fill="freeze"/>
    <animate attributeName="x" values="500;290" dur="1.1s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0.7;1" dur="1.4s" repeatCount="indefinite"/>
  </rect>

  <text x="500" y="178" text-anchor="middle" font-family="Orbitron, Verdana, sans-serif"
        font-size="17" letter-spacing="5" fill="#9fb3ff">AI&#160;/&#160;ML&#160;ENGINEER&#160;&#183;&#160;JEDI&#160;OF&#160;CODE</text>
  <text x="500" y="206" text-anchor="middle" font-family="Verdana, sans-serif"
        font-size="13" letter-spacing="2" fill="#5f6f9f" font-style="italic">a long time ago in a codebase far, far away...</text>
</svg>
