<svg xmlns="http://www.w3.org/2000/svg" width="760" height="150" viewBox="0 0 760 150" role="img" aria-label="Darksaber">
  <defs>
    <!-- soft outer glow for the blade -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- blade body gradient: black core, glowing white-violet edge -->
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#c9b6ff"/>
      <stop offset="18%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#1a1030"/>
      <stop offset="82%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c9b6ff"/>
    </linearGradient>
    <linearGradient id="hilt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9aa0a6"/>
      <stop offset="50%" stop-color="#e8eaed"/>
      <stop offset="100%" stop-color="#5f6368"/>
    </linearGradient>
  </defs>

  <rect width="760" height="150" fill="#05060a"/>
  <!-- faint stars -->
  <g fill="#ffffff" opacity="0.5">
    <circle cx="60" cy="30" r="1"/><circle cx="140" cy="110" r="1.2"/><circle cx="230" cy="40" r="0.9"/>
    <circle cx="320" cy="120" r="1"/><circle cx="500" cy="25" r="1.1"/><circle cx="600" cy="100" r="0.9"/>
    <circle cx="690" cy="55" r="1.2"/><circle cx="410" cy="20" r="0.8"/><circle cx="720" cy="125" r="1"/>
  </g>

  <!-- HILT (fixed, right side) -->
  <g transform="translate(648,62)">
    <rect x="0" y="0" width="92" height="26" rx="5" fill="url(#hilt)" stroke="#202124" stroke-width="1.5"/>
    <rect x="10" y="4" width="6" height="18" fill="#202124"/>
    <rect x="26" y="4" width="6" height="18" fill="#202124"/>
    <rect x="42" y="4" width="6" height="18" fill="#202124"/>
    <!-- emitter -->
    <rect x="-10" y="2" width="12" height="22" rx="2" fill="#bdc1c6" stroke="#202124" stroke-width="1"/>
  </g>

  <!-- BLADE: grows from hilt (x=648) toward left, then pulses -->
  <g filter="url(#glow)">
    <rect x="60" y="66" width="588" height="18" rx="9" fill="url(#edge)" transform="translate(588,0) scale(0,1)">
      <!-- ignite: scale x 0 -> 1 (blade extends) -->
      <animateTransform attributeName="transform" type="scale"
        values="0 1; 1 1; 1 1; 1 1; 0 1"
        keyTimes="0; 0.18; 0.85; 0.93; 1"
        dur="6s" additive="sum" repeatCount="indefinite"/>
      <!-- subtle hum flicker on the glow -->
      <animate attributeName="opacity" values="1;0.82;1;0.9;1" dur="0.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- bright crackle core line -->
  <rect x="66" y="73" width="576" height="4" rx="2" fill="#ffffff" transform="translate(642,0) scale(0,1)">
    <animateTransform attributeName="transform" type="scale"
      values="0 1; 1 1; 1 1; 1 1; 0 1"
      keyTimes="0; 0.18; 0.85; 0.93; 1"
      dur="6s" additive="sum" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.6;0.95;0.7;0.9" dur="0.3s" repeatCount="indefinite"/>
  </rect>

  <text x="30" y="135" fill="#8a7fff" font-family="Orbitron, Verdana, sans-serif" font-size="13" letter-spacing="3">THIS  IS  THE  WAY</text>
</svg>
